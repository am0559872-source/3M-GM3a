<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عم جمعة بتاع البرجر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jomhuria&family=Cairo:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --char: #1B130E;
      --char-soft: #241810;
      --ember1: #FF6A1A;
      --ember2: #D62B12;
      --gold-ash: #F2C879;
      --smoke: #F4E4C9;
      --smoke-dim: rgba(244, 228, 201, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: #0A0605;
      color: var(--smoke);
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 18px 50px;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: -3;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 8%, rgba(255, 106, 26, 0.10), transparent 40%),
        radial-gradient(circle at 82% 6%, rgba(214, 43, 18, 0.10), transparent 38%),
        radial-gradient(ellipse at 50% 112%, rgba(255, 106, 26, 0.30), transparent 58%),
        radial-gradient(ellipse at 50% 130%, rgba(214, 43, 18, 0.22), transparent 55%),
        linear-gradient(180deg, #0B0705 0%, #120907 40%, #160A07 70%, #0E0604 100%);
    }

    .bg::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        repeating-linear-gradient(55deg, rgba(244, 228, 201, 0.025) 0px, rgba(244, 228, 201, 0.025) 2px, transparent 2px, transparent 26px),
        repeating-linear-gradient(-55deg, rgba(244, 228, 201, 0.02) 0px, rgba(244, 228, 201, 0.02) 2px, transparent 2px, transparent 26px);
      mix-blend-mode: screen;
    }

    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, transparent 35%, rgba(0, 0, 0, 0.55) 100%);
    }

    .smoke-layer {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
    }

    .smoke {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244, 228, 201, 0.05), transparent 70%);
      filter: blur(18px);
      animation: drift 22s ease-in-out infinite alternate;
    }

    .smoke.s1 {
      width: 340px;
      height: 340px;
      left: -60px;
      top: 8%;
      animation-duration: 26s;
    }

    .smoke.s2 {
      width: 280px;
      height: 280px;
      right: -70px;
      top: 50%;
      animation-duration: 20s;
      animation-delay: 3s;
    }

    .smoke.s3 {
      width: 220px;
      height: 220px;
      left: 30%;
      top: 75%;
      animation-duration: 18s;
      animation-delay: 6s;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0.5;
      }

      100% {
        transform: translate(40px, -30px) scale(1.15);
        opacity: 0.85;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .smoke {
        animation: none;
      }
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      position: relative;
      z-index: 1;
    }

    /* ===== top bar ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .topbar .ico-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(255, 106, 26, 0.55);
      color: var(--ember1);
      background: rgba(244, 228, 201, 0.03);
    }

    .topbar .social-mini {
      display: flex;
      gap: 8px;
    }

    /* ===== ember particles ===== */
    .embers {
      position: absolute;
      inset: -30px -20px auto -20px;
      height: 360px;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ember {
      position: absolute;
      bottom: -10px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-ash), var(--ember1) 60%, transparent 100%);
      box-shadow: 0 0 6px 1px rgba(255, 122, 26, 0.8);
      opacity: 0;
      animation: rise 6.5s ease-in infinite;
    }

    .ember:nth-child(1) {
      left: 12%;
      animation-delay: 0s;
      width: 4px;
      height: 4px;
    }

    .ember:nth-child(2) {
      left: 28%;
      animation-delay: 1.2s;
      width: 6px;
      height: 6px;
    }

    .ember:nth-child(3) {
      left: 48%;
      animation-delay: 2.4s;
      width: 3px;
      height: 3px;
    }

    .ember:nth-child(4) {
      left: 63%;
      animation-delay: 0.6s;
      width: 5px;
      height: 5px;
    }

    .ember:nth-child(5) {
      left: 77%;
      animation-delay: 3.1s;
      width: 4px;
      height: 4px;
    }

    .ember:nth-child(6) {
      left: 85%;
      animation-delay: 1.8s;
      width: 6px;
      height: 6px;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }

      8% {
        opacity: 0.9;
      }

      50% {
        transform: translateY(-150px) translateX(10px);
        opacity: 0.7;
      }

      100% {
        transform: translateY(-320px) translateX(-6px);
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .ember {
        animation: none;
        opacity: 0;
      }
    }

    /* ===== logo badge + stamp ===== */
    .badge {
      position: relative;
      display: flex;
      justify-content: center;
      margin-top: 6px;
      z-index: 1;
    }

    .badge-glow {
      position: absolute;
      width: 88%;
      height: 70%;
      bottom: 2%;
      left: 6%;
      background: radial-gradient(ellipse at center, rgba(214, 43, 18, 0.5), transparent 70%);
      filter: blur(10px);
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.7;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.06);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .badge-glow {
        animation: none;
      }
    }

    .badge img {
      position: relative;
      z-index: 1;
      width: 78%;
      max-width: 300px;
      filter: drop-shadow(0 10px 26px rgba(0, 0, 0, 0.65));
    }

    .fresh-stamp {
      position: absolute;
      top: 6%;
      right: 2%;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 2px dashed var(--gold-ash);
      background: radial-gradient(circle at 35% 30%, #2A1B12, #120907);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: rotate(-12deg);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.5);
      z-index: 2;
    }

    .fresh-stamp span {
      display: block;
      text-align: center;
      line-height: 1.15;
    }

    .fresh-stamp .num {
      font-weight: 900;
      font-size: 15px;
      color: var(--ember1);
    }

    .fresh-stamp .txt {
      font-size: 11px;
      color: var(--smoke);
      opacity: 0.85;
    }

    /* ===== slogan (flame text) ===== */
    .slogan {
      text-align: center;
      font-family: 'Jomhuria', serif;
      margin-top: 10px;
      line-height: 1.05;
      position: relative;
    }

    .slogan .flame-deco {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
      filter: drop-shadow(0 0 8px rgba(255, 106, 26, 0.8));
    }

    .slogan .l1 {
      display: block;
      font-size: 30px;
      color: var(--smoke-dim);
      letter-spacing: 0.5px;
    }

    .slogan .l2 {
      display: block;
      font-size: 52px;
      margin-top: -2px;
      background: linear-gradient(180deg, var(--gold-ash) 0%, var(--ember1) 50%, var(--ember2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 3px 12px rgba(214, 43, 18, 0.6));
      letter-spacing: 1px;
    }

    /* ===== corner flame decorations ===== */
    .corner-flame {
      position: fixed;
      bottom: -10px;
      width: 180px;
      opacity: 0.5;
      z-index: -1;
      pointer-events: none;
    }

    .corner-flame.left {
      left: -30px;
      transform: scaleX(-1);
    }

    .corner-flame.right {
      right: -30px;
    }

    /* ===== grate divider ===== */
    .grate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 20px auto 22px;
      width: 220px;
    }

    .grate .bar {
      height: 3px;
      flex: 1;
      background: linear-gradient(90deg, transparent, var(--ember2));
      border-radius: 2px;
    }

    .grate .bar.right {
      background: linear-gradient(90deg, var(--ember1), transparent);
    }

    .grate .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ember1);
      box-shadow: 0 0 8px rgba(255, 106, 26, 0.85);
      flex: none;
    }

    /* ===== pill buttons ===== */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .pill {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--smoke);
      background: linear-gradient(180deg, var(--char-soft), var(--char));
      border-radius: 999px;
      padding: 12px 18px;
      border: 1.5px solid rgba(255, 106, 26, 0.35);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), inset 0 0 14px rgba(255, 106, 26, 0.05);
      transition: transform 0.15s ease, border-color 0.2s ease;
    }

    .pill:active {
      transform: scale(0.97);
    }

    .pill:hover {
      border-color: var(--ember1);
    }

    .pill .chev {
      font-size: 16px;
      color: var(--ember1);
      opacity: 0.8;
      flex: none;
    }

    .pill-body {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
      text-align: center;
    }

    .pill-title {
      font-weight: 800;
      font-size: 16px;
    }

    .pill-sub {
      font-size: 11.5px;
      color: var(--smoke-dim);
    }

    .pill-icon {
      flex: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .pill-menu .pill-icon {
      background: linear-gradient(160deg, var(--ember1), var(--ember2));
      color: #1B0E08;
    }

    .pill-call .pill-icon {
      background: linear-gradient(160deg, #2A1B12, #120907);
      border: 1.5px solid var(--ember1);
      color: var(--gold-ash);
    }

    .pill-wa .pill-icon {
      background: linear-gradient(160deg, #2BBF6E, #1C8C50);
      color: #0E0604;
    }

    .pill-fb .pill-icon {
      background: linear-gradient(160deg, #4A6FA8, #2C4670);
      color: var(--smoke);
    }

    /* ===== info strip ===== */
    .info-strip {
      display: flex;
      margin-top: 26px;
      border: 1px solid rgba(244, 228, 201, 0.12);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(244, 228, 201, 0.02);
    }

    .info-cell {
      flex: 1;
      padding: 14px 8px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border-left: 1px solid rgba(244, 228, 201, 0.1);
    }

    .info-cell:last-child {
      border-left: none;
    }

    .info-cell .ic {
      color: var(--ember1);
    }

    .info-cell .t1 {
      font-size: 11.5px;
      font-weight: 700;
      color: var(--smoke);
    }

    .info-cell .t2 {
      font-size: 10.5px;
      color: var(--smoke-dim);
      line-height: 1.4;
    }

    /* ===== bottom social ===== */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 24px;
    }

    .social-row a {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(255, 106, 26, 0.4);
      color: var(--gold-ash);
      text-decoration: none;
    }

    footer {
      text-align: center;
      margin-top: 18px;
      font-size: 11.5px;
      color: var(--smoke);
      opacity: 0.4;
    }
  </style>
</head>

  <div class="smoke-layer">

      <div class="social-mini">

      </div>

        <span class="ember"></span><span class="ember"></span><span class="ember"></span><span class="ember"></span>
        <span class="ember"></span><span class="ember"></span>
